services:
  postgres:
    image: postgres:16
    container_name: emily-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-emily}
      POSTGRES_USER: ${POSTGRES_USER:-emily}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-emily}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:

